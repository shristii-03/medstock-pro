server:
  port: 8080

spring:
  application:
    name: medstock-pro

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/medstock_pro}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

jwt:
  secret: ${JWT_SECRET:3f8b2a1d9e4c7f6a2b5d8e1f4a7c0b3e6d9f2a5c8b1e4d7a0c3f6b9e2d5a8c1}
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

app:
  name: "MedStock Pro"
  description: "Pharmacy Inventory Management System"
  alert:
    expiry-warning-days: 90
    expiry-critical-days: 30
  admin-email: ${ADMIN_EMAIL:admin@medstockpro.com}
  gst-number: ${GST_NUMBER:22AAAAA0000A1Z5}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.medstockpro: DEBUG
    org.springframework.security: INFO